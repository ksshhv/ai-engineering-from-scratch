<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .old { fill: #eeeeee; stroke: #888; stroke-width: 1.2; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .needle { fill: #c0392b; stroke: #1a1a1a; stroke-width: 1; }
      .noise { fill: #bfbfbf; stroke: #666; stroke-width: 0.8; }
      .signal { fill: #2e7d32; stroke: #1a1a1a; stroke-width: 1; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="title">differential attention: two softmax maps, one subtraction</text>

  <!-- Pipeline -->
  <rect x="30" y="55" width="140" height="48" class="box"/>
  <text x="100" y="78" text-anchor="middle" class="step">query h</text>
  <text x="100" y="94" text-anchor="middle" class="small">split: Q1, Q2</text>

  <line x1="170" y1="79" x2="210" y2="79" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="210" y="55" width="200" height="48" class="hot"/>
  <text x="310" y="78" text-anchor="middle" class="step">map1 = softmax(Q1 K1T / sqrt d)</text>
  <text x="310" y="94" text-anchor="middle" class="small">full distribution, noisy</text>

  <rect x="210" y="120" width="200" height="48" class="old"/>
  <text x="310" y="143" text-anchor="middle" class="step">map2 = softmax(Q2 K2T / sqrt d)</text>
  <text x="310" y="159" text-anchor="middle" class="small">same shape noise, different content</text>

  <line x1="170" y1="79" x2="170" y2="144" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="170" y1="144" x2="210" y2="144" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="410" y1="79" x2="470" y2="79" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="144" x2="470" y2="144" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="470" y="82" width="180" height="60" class="cool"/>
  <text x="560" y="108" text-anchor="middle" class="step">map1 - lambda * map2</text>
  <text x="560" y="126" text-anchor="middle" class="small">common-mode cancels, signal stays</text>

  <line x1="650" y1="112" x2="700" y2="112" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="700" y="85" width="220" height="54" class="box"/>
  <text x="810" y="108" text-anchor="middle" class="step">attention weights</text>
  <text x="810" y="126" text-anchor="middle" class="small">weights can be negative, entropy drops</text>

  <!-- Bar chart: standard vs differential -->
  <rect x="30" y="200" width="900" height="280" class="box"/>
  <text x="480" y="224" text-anchor="middle" class="label">attention on an 8-token sequence (query at pos 7, needle at pos 5)</text>

  <text x="60" y="252" class="head">standard softmax</text>
  <text x="500" y="252" class="head">differential (map1 - 0.7 * map2)</text>

  <!-- Standard bars (scaled: max bar width 200 = 1.0) -->
  <!-- weights approx: [0.076, 0.099, 0.081, 0.068, 0.073, 0.288, 0.080, 0.236] -->
  <g transform="translate(60,262)">
    <text x="0" y="14" class="small">0</text><rect x="30" y="4" width="30" height="14" class="noise"/>
    <text x="0" y="32" class="small">1</text><rect x="30" y="22" width="40" height="14" class="noise"/>
    <text x="0" y="50" class="small">2</text><rect x="30" y="40" width="32" height="14" class="noise"/>
    <text x="0" y="68" class="small">3</text><rect x="30" y="58" width="27" height="14" class="noise"/>
    <text x="0" y="86" class="small">4</text><rect x="30" y="76" width="29" height="14" class="noise"/>
    <text x="0" y="104" class="small">5</text><rect x="30" y="94" width="115" height="14" class="needle"/>
    <text x="0" y="122" class="small">6</text><rect x="30" y="112" width="32" height="14" class="noise"/>
    <text x="0" y="140" class="small">7</text><rect x="30" y="130" width="94" height="14" class="signal"/>
    <text x="160" y="107" class="small">needle 0.288</text>
    <text x="140" y="143" class="small">query 0.236</text>
    <text x="70" y="183" class="caption">distractor mass: +0.476 (common-mode noise spreads across 0,1,2,3,4,6)</text>
  </g>

  <!-- Differential bars, scaled the same way; negatives go left -->
  <!-- weights approx: [0.003, 0.056, -0.012, 0.007, 0.016, 0.118, 0.021, 0.091] -->
  <g transform="translate(500,262)">
    <!-- zero axis at x=100 -->
    <line x1="100" y1="0" x2="100" y2="150" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3"/>
    <text x="0" y="14" class="small">0</text><rect x="100" y="4" width="1" height="14" class="noise"/>
    <text x="0" y="32" class="small">1</text><rect x="100" y="22" width="22" height="14" class="noise"/>
    <text x="0" y="50" class="small">2</text><rect x="95" y="40" width="5" height="14" class="noise"/>
    <text x="0" y="68" class="small">3</text><rect x="100" y="58" width="3" height="14" class="noise"/>
    <text x="0" y="86" class="small">4</text><rect x="100" y="76" width="6" height="14" class="noise"/>
    <text x="0" y="104" class="small">5</text><rect x="100" y="94" width="47" height="14" class="needle"/>
    <text x="0" y="122" class="small">6</text><rect x="100" y="112" width="8" height="14" class="noise"/>
    <text x="0" y="140" class="small">7</text><rect x="100" y="130" width="36" height="14" class="signal"/>
    <text x="160" y="107" class="small">needle 0.118</text>
    <text x="140" y="143" class="small">query 0.091</text>
    <text x="70" y="183" class="caption">distractor mass: +0.091 (noise flattened toward zero)</text>
  </g>

  <!-- Verdict strip -->
  <rect x="60" y="460" width="840" height="14" fill="none"/>
  <text x="480" y="510" text-anchor="middle" class="caption">needle-to-noise ratio: standard 0.60 -> differential 1.29 on seed 20260422 (see code/main.py)</text>

  <text x="480" y="532" text-anchor="middle" class="caption">Ye et al., arXiv 2410.05258 — two softmax heads, one subtraction, sparser attention</text>
</svg>
